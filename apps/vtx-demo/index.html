<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vtx-engine Demo</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>vtx-engine Demo</h1>
      <div id="status-bar">
        <span id="status-text">Initializing...</span>
        <span id="model-status"></span>
        <span id="gpu-status" class="status-badge"></span>
        <span id="model-name" class="status-badge"></span>
      </div>
    </header>

    <main>
      <!-- Controls -->
      <section id="controls">
        <div class="control-group">
          <label for="device-select">Input Device:</label>
          <select id="device-select">
            <option value="">Loading devices...</option>
          </select>
          <button id="btn-record" disabled>Record</button>
          <button id="btn-stop" disabled>Stop</button>
        </div>

        <div class="control-group">
          <button id="btn-open-file">Open WAV File</button>
          <button id="btn-download-model" style="display:none">Download Model</button>
        </div>

        <div class="control-group transcription-toggle-group">
          <label class="toggle-label" for="transcription-toggle">
            <input type="checkbox" id="transcription-toggle" checked />
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
            <span class="toggle-text">Transcription</span>
          </label>
        </div>
      </section>

      <!-- Visualizations -->
      <section id="visualizations">
        <div class="visualization-container">
          <div class="visualization-row">
            <div class="panel-wrapper">
              <div class="panel-label">Waveform</div>
              <div class="panel waveform-area">
                <canvas id="waveform-canvas"></canvas>
              </div>
            </div>
            <div class="panel-wrapper">
              <div class="panel-label">Spectrogram</div>
              <div class="panel spectrogram-area">
                <canvas id="spectrogram-canvas"></canvas>
              </div>
            </div>
          </div>
          <div class="panel-wrapper speech-activity-wrapper">
            <div class="panel-label">Speech Activity</div>
            <div class="panel speech-activity-area">
              <canvas id="speech-canvas"></canvas>
            </div>
          </div>
        </div>
        <div class="status-legend-row">
          <div class="speech-activity-legend">
            <span class="legend-item"><span class="legend-color" style="background: var(--vtx-speech-confirmed);"></span>Speaking</span>
            <span class="legend-item"><span class="legend-color" style="background: var(--vtx-metric-amplitude);"></span>Amplitude</span>
            <span class="legend-item"><span class="legend-color" style="background: var(--vtx-metric-zcr);"></span>ZCR</span>
            <span class="legend-item"><span class="legend-color" style="background: var(--vtx-metric-centroid);"></span>Centroid</span>
            <span class="legend-item"><span class="legend-color" style="background: var(--vtx-speech-word-break);"></span>Word Break</span>
          </div>
        </div>
      </section>

      <!-- Transcription Output -->
      <section id="transcription">
        <h3>Transcription</h3>
        <div id="transcription-output">
          <p class="placeholder">Transcription results will appear here...</p>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
