name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache whisper.cpp dependencies
        uses: actions/cache@v4
        with:
          path: target/whisper-cache
          key: whisper-1.8.2-${{ runner.os }}-${{ hashFiles('**/build.rs') }}
          restore-keys: |
            whisper-1.8.2-${{ runner.os }}-

      - name: Install Linux audio dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpipewire-0.3-dev cmake

      - name: cargo check
        run: cargo check -p vtx-engine

      - name: cargo test
        run: cargo test -p vtx-engine

  typescript:
    name: TypeScript (vtx-viz)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: packages/vtx-viz/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: packages/vtx-viz
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: packages/vtx-viz
        run: pnpm build
